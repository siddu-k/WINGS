<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' https:;">
    <title>Admin Dashboard - WINGS 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .admin-container {
            flex: 1;
            padding: 100px 20px 40px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .dashboard-card {
            width: 100%;
            padding: 30px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            min-width: 1000px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            background-color: rgba(242, 201, 76, 0.1);
            color: var(--gold);
            font-family: var(--font-heading);
            font-weight: 600;
        }
        tr:hover {
            background-color: rgba(255,255,255,0.05);
        }
        .status-select {
            padding: 5px 10px;
            border-radius: 4px;
            background: rgba(0,0,0,0.3);
            color: white;
            border: 1px solid var(--glass-border);
        }
        .action-btn {
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-size: 0.8rem;
            background: var(--primary-blue);
            color: white;
        }
        .action-btn:hover {
            background: var(--light-blue);
        }
        .refresh-btn {
            margin-bottom: 20px;
            float: right;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            color: var(--gold);
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            color: #ccc;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Toggle Switch Styles */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #f02e65; /* Appwrite Color */
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #3ecf8e; /* Supabase Green */
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #09101a; /* var(--dark-bg) fallback */
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">
            <a href="index.html">
                <img src="PYDAH FLAG  (1).png" alt="Pydah Logo" style="height: 60px;" class="nav-logo">
            </a>
        </div>
        <ul class="nav-links nav-links-compact">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="status.html">Status</a></li>
        </ul>
    </nav>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="color: var(--gold); margin-bottom: 20px; font-family: var(--font-heading);">Admin Login</h2>
            <input type="text" id="adminUser" class="login-input" placeholder="Username">
            <input type="password" id="adminPass" class="login-input" placeholder="Password">
            <button onclick="checkLogin()" class="btn btn-orange glow-button" style="width: 100%;">Login</button>
            <p id="loginError" style="color: #ef4444; margin-top: 10px; display: none;">Invalid credentials</p>
        </div>
    </div>

    <div class="admin-container">
        <h2 class="events-title" style="color: var(--gold); margin-bottom: 30px;">Admin Dashboard</h2>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Registrations</div>
                <div class="stat-number" id="totalReg">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Verified</div>
                <div class="stat-number" id="verifiedReg">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending</div>
                <div class="stat-number" id="pendingReg">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-number" id="totalRev">₹0</div>
            </div>
        </div>

        <div class="glass-card dashboard-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <h3 style="color: white; margin: 0;">Registration List</h3>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color: #aaa; font-size: 0.8rem;">Source:</span>
                    <label class="switch">
                        <input type="checkbox" id="sourceToggle" onchange="toggleSource()">
                        <span class="slider round"></span>
                    </label>
                    <span id="sourceLabel" style="color: #f02e65; font-weight: bold; font-size: 0.9rem;">Appwrite</span>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterTable()" style="padding: 8px 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-family: var(--font-ui); outline: none;">
                    <button onclick="downloadCSV()" class="btn btn-orange glow-button" style="margin-bottom: 0; padding: 8px 15px; font-size: 0.85rem;">Export CSV</button>
                    <button onclick="fetchRegistrations()" class="btn btn-blue glow-button refresh-btn" style="margin-bottom: 0; padding: 8px 15px; font-size: 0.85rem;">Refresh</button>
                </div>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="regTable">
                    <thead>
                        <tr>
                            <th>Short ID</th>
                            <th>Date</th>
                            <th>Name</th>
                            <th>College</th>
                            <th>Phone</th>
                            <th>Events</th>
                            <th>Payment Ref</th>
                            <th>Abstract</th>
                            <th>Status</th>
                            <th>Attended</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" style="text-align: center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const client = new Appwrite.Client();
        client.setEndpoint('https://sgp.cloud.appwrite.io/v1').setProject('69aace7f002dc7981fc6');
        const databases = new Appwrite.Databases(client);
        const DATABASE_ID = '69aacf420003152c50f2';
        const COLLECTION_ID = '69aae492003d1d3dfdba';

        // Supabase Config
        const SUPABASE_URL = 'https://miflxuibznwljdqddvso.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pZmx4dWliem53bGpkcWRkdnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTM2MzYsImV4cCI6MjA4ODM4OTYzNn0._iK-yrsoTgmI_T0I8M5wzFx-oDOkDAFoZh1b9h6_K8g';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSource = 'Appwrite';
        let allRegistrations = [];

        function checkLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if (user === 'pydah' && pass === 'wings2k26') {
                document.getElementById('loginOverlay').style.display = 'none';
                fetchRegistrations();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function toggleSource() {
            const toggle = document.getElementById('sourceToggle');
            const label = document.getElementById('sourceLabel');
            
            if (toggle.checked) {
                currentSource = 'Supabase';
                label.textContent = 'Supabase';
                label.style.color = '#3ecf8e';
            } else {
                currentSource = 'Appwrite';
                label.textContent = 'Appwrite';
                label.style.color = '#f02e65';
            }
            fetchRegistrations();
        }

        async function fetchRegistrations() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = `<tr><td colspan="8" style="text-align: center;">Loading from ${currentSource}...</td></tr>`;

            try {
                let docs = [];
                if (currentSource === 'Appwrite') {
                    const response = await databases.listDocuments(
                        DATABASE_ID,
                        COLLECTION_ID,
                        [Appwrite.Query.limit(100), Appwrite.Query.orderDesc('timestamp')]
                    );
                    docs = response.documents;
                } else {
                    const { data, error } = await supabaseClient
                        .from('registrations')
                        .select('*')
                        .order('timestamp', { ascending: false })
                        .limit(100);
                    if (error) throw error;
                    docs = data.map(d => ({ ...d, $id: d.id })); // Map ID for compatibility
                }

                allRegistrations = docs;
                updateStats(docs);
                renderTable(docs);

            } catch (error) {
                console.error(error);
                let errorMsg = error.message;
                if (errorMsg === 'Failed to fetch') {
                    errorMsg += '. This is likely a CORS error. Please add "127.0.0.1" (or "localhost") as a Web Platform in your Appwrite Console.';
                }
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #ef4444;">Error fetching data from ${currentSource}: ${errorMsg}</td></tr>`;
            }
        }

        function updateStats(docs) {
            document.getElementById('totalReg').textContent = docs.length;
            const verified = docs.filter(d => d.verification_status === 'Verified').length;
            document.getElementById('verifiedReg').textContent = verified;
            document.getElementById('pendingReg').textContent = docs.length - verified;
            document.getElementById('totalRev').textContent = '₹' + (docs.length * 300);
        }

        function renderTable(docs) {
            const tableBody = document.getElementById('tableBody');
            if (docs.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No registrations found.</td></tr>';
                return;
            }

            tableBody.innerHTML = docs.map(doc => {
                let eventsDisplay = doc.events;
                try {
                    const parsed = JSON.parse(doc.events);
                    if (Array.isArray(parsed)) eventsDisplay = parsed.map(e => e.replace(/-/g, ' ')).join(', ');
                } catch (e) {}

                const date = new Date(doc.timestamp).toLocaleDateString();

                let abstractHtml = '<span style="color: #aaa;">-</span>';
                if (doc.projectAbstractFileId) {
                    if (currentSource === 'Appwrite') {
                        abstractHtml = `<a href="https://sgp.cloud.appwrite.io/v1/storage/buckets/69aae4bf003c0163ef2c/files/${doc.projectAbstractFileId}/view?project=69aace7f002dc7981fc6" target="_blank" class="action-btn" style="background: var(--primary-orange); text-decoration: none; font-size: 0.75rem; padding: 4px 8px;"><i class="fa-solid fa-file-pdf"></i> Open</a>`;
                    } else {
                        // Supabase
                        abstractHtml = `<a href="https://miflxuibznwljdqddvso.supabase.co/storage/v1/object/public/abstracts/${doc.projectAbstractFileId}" target="_blank" class="action-btn" style="background: var(--primary-orange); text-decoration: none; font-size: 0.75rem; padding: 4px 8px;"><i class="fa-solid fa-file-pdf"></i> Open</a>`;
                    }
                }

                return `
                    <tr>
                        <td><span style="font-weight: bold; color: var(--gold);">${doc.shortId || '-'}</span></td>
                        <td>${date}</td>
                        <td>
                            <div>${doc.name}</div>
                            <div style="font-size: 0.8em; color: #aaa;">${doc.email}</div>
                        </td>
                        <td>${doc.college}</td>
                        <td>${doc.phone}</td>
                        <td><div style="max-width: 200px; white-space: normal;">${eventsDisplay}</div></td>
                        <td>${doc.paymentReference}</td>
                        <td>${abstractHtml}</td>
                        <td>
                            <select class="status-select" id="status-${doc.$id}" style="border-color: ${doc.verification_status === 'Verified' ? '#4ade80' : '#facc15'}">
                                <option value="Pending" ${doc.verification_status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Verified" ${doc.verification_status === 'Verified' ? 'selected' : ''}>Verified</option>
                                <option value="Rejected" ${doc.verification_status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                            </select>
                        </td>
                        <td>
                            <span style="color: ${doc.attended ? '#4ade80' : '#ef4444'}; font-weight: bold;">${doc.attended ? 'Yes' : 'No'}</span>
                        </td>
                        <td>
                            <button onclick="updateStatus('${doc.$id}')" class="action-btn">Update</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function updateStatus(docId) {
            const select = document.getElementById(`status-${docId}`);
            const newStatus = select.value;
            // Navigate past 'Attended' column to get to 'Actions' column
            const btn = select.parentElement.nextElementSibling.nextElementSibling.querySelector('button');
            
            const originalText = btn.textContent;
            btn.textContent = '...';
            btn.disabled = true;

            try {
                if (currentSource === 'Appwrite') {
                    await databases.updateDocument(DATABASE_ID, COLLECTION_ID, docId, {
                        verification_status: newStatus
                    });
                } else {
                    const { error } = await supabaseClient
                        .from('registrations')
                        .update({ verification_status: newStatus })
                        .eq('id', docId);
                    if (error) throw error;
                }
                
                // Visual feedback
                select.style.borderColor = newStatus === 'Verified' ? '#4ade80' : (newStatus === 'Rejected' ? '#ef4444' : '#facc15');
                btn.textContent = 'Saved';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            } catch (error) {
                alert('Failed to update: ' + error.message);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allRegistrations.filter(doc => 
                (doc.shortId && doc.shortId.includes(query)) ||
                doc.name.toLowerCase().includes(query) ||
                doc.email.toLowerCase().includes(query) ||
                doc.phone.includes(query) ||
                doc.college.toLowerCase().includes(query) ||
                (doc.paymentReference && doc.paymentReference.toLowerCase().includes(query))
            );
            renderTable(filtered);
        }

        function downloadCSV() {
            if (!allRegistrations.length) return;
            
            const headers = ['ID', 'Short ID', 'Name', 'Email', 'Phone', 'College', 'Department', 'Year', 'Events', 'Type', 'Team Name', 'Payment Ref', 'Status', 'Attended', 'Timestamp'];
            const csvRows = [headers.join(',')];
            
            allRegistrations.forEach(doc => {
                let eventsStr = doc.events;
                try {
                    const parsed = JSON.parse(doc.events);
                    if (Array.isArray(parsed)) eventsStr = parsed.join('; ');
                } catch(e) {}
                
                // Escape quotes
                const escape = (text) => text ? `"${text.toString().replace(/"/g, '""')}"` : '""';
                
                const row = [
                    escape(doc.$id),
                    escape(doc.shortId),
                    escape(doc.name),
                    escape(doc.email),
                    escape(doc.phone),
                    escape(doc.college),
                    escape(doc.department),
                    escape(doc.year),
                    escape(eventsStr),
                    escape(doc.participationType),
                    escape(doc.teamName),
                    escape(doc.paymentReference),
                    escape(doc.verification_status),
                    escape(doc.attended),
                    escape(doc.timestamp)
                ];
                csvRows.push(row.join(','));
            });
            
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'wings_registrations.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

    </script>
</body>
</html>
